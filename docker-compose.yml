version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: emotion_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        APT_MIRROR: mirrors.tuna.tsinghua.edu.cn
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
    container_name: emotion_backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - USE_GPU=0
      - EMO_MOCK=0
      - MODEL_SRC_DIR=/app/src
      - HF_LOCAL_ONLY=1
      - HF_ENDPOINT=https://hf-mirror.com
      - WATCHFILES_FORCE_POLLING=1
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./src:/app/src
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  inference_api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        APT_MIRROR: mirrors.tuna.tsinghua.edu.cn
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
    container_name: emotion_inference_api
    ports:
      - "8002:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - HF_LOCAL_ONLY=1
      - HF_ENDPOINT=https://hf-mirror.com
      - EMO_REDIS_URL=redis://redis:6379/0
      - EMO_CHECKPOINT=/app/checkpoints/best.pt
      - EMO_BATCH_SIZE=8
      - EMO_BATCH_TIMEOUT_MS=20
      - EMO_WORKER_COUNT=1
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./src:/app/src
      - ./backend/app:/app/app
    command: uvicorn inference_server:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  inference_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        APT_MIRROR: mirrors.tuna.tsinghua.edu.cn
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
    container_name: emotion_inference_worker
    environment:
      - PYTHONUNBUFFERED=1
      - HF_LOCAL_ONLY=1
      - HF_ENDPOINT=https://hf-mirror.com
      - EMO_REDIS_URL=redis://redis:6379/0
      - EMO_CHECKPOINT=/app/checkpoints/best.pt
      - EMO_BATCH_SIZE=8
      - EMO_BATCH_TIMEOUT_MS=20
      - EMO_WORKER_NAME=docker-worker-1
      - EMO_INFERENCE_BACKEND=torch
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./src:/app/src
    command: python -m inference_worker
    depends_on:
      redis:
        condition: service_healthy

  # Frontend Web Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: emotion_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/share/nginx/html

  # vLLM OpenAI API Server (optional LLM service)
  # NOTE: Disabled by default - vLLM requires GPU support
  # To enable, uncomment below and configure Docker GPU access
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   container_name: emotion_vllm
  #   ports:
  #     - "8001:8000"
  #   environment:
  #     - CUDA_VISIBLE_DEVICES=0
  #   volumes:
  #     - huggingface_cache:/root/.cache/huggingface
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   command: --model meta-llama/Llama-2-7b-hf

volumes:
  huggingface_cache:
